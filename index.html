<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Tap Play</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .u-screen-bg {
      background: radial-gradient(
          ellipse 120% 80% at 50% 0%,
          rgba(40, 40, 48, 0.45) 0%,
          transparent 55%
        ),
        linear-gradient(180deg, #0c0c0e 0%, #050506 50%, #0a0a0b 100%);
    }

    .u-vignette::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    .app {
      position: relative;
      min-height: 100dvh;
      min-height: 100vh;
    }

    .panel {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(1.5rem, env(safe-area-inset-top))
        max(1.5rem, env(safe-area-inset-right))
        max(2rem, env(safe-area-inset-bottom))
        max(1.5rem, env(safe-area-inset-left));
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        visibility 0.5s step-end;
    }

    .panel.is-active {
      z-index: 2;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        visibility 0s;
    }

    .panel--countdown {
      z-index: 4;
      justify-content: center;
      background: #050506;
    }

    .panel--countdown.is-active {
      z-index: 4;
    }

    .panel--game {
      align-items: stretch;
      justify-content: flex-start;
      padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
    }

    /* Welcome */
    .brand {
      position: relative;
      z-index: 1;
      text-align: center;
      letter-spacing: 0.12em;
      font-weight: 800;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1.05;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
      animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards,
        pulse 2.4s ease-in-out 0.9s infinite;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
    }

    @keyframes enter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
        letter-spacing: 0.12em;
      }
      50% {
        opacity: 0.92;
        transform: scale(1.02);
        letter-spacing: 0.14em;
      }
    }

    .subline {
      position: relative;
      z-index: 1;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .apple-wrap {
      position: relative;
      z-index: 1;
      margin-top: 3rem;
      width: 100%;
      max-width: 280px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .apple-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .apple-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 6px;
      background: #000;
      color: #fff;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .apple-btn:active {
      transform: scale(0.98);
      filter: brightness(1.08);
    }

    .apple-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .accent-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(40%, 140px);
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      opacity: 0.6;
      z-index: 1;
    }

    /* Load screen */
    .load-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .venue-name {
      font-variant: all-small-caps;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: auto;
      padding-top: 0.25rem;
    }

    .symbol-emoji {
      font-size: clamp(4.25rem, 22vw, 6.5rem);
      line-height: 1;
      filter: drop-shadow(0 0 28px rgba(255, 255, 255, 0.12));
      margin: 0.5rem 0 1rem;
    }

    .symbol-label {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 0.85rem;
    }

    .instructions {
      font-size: 0.82rem;
      line-height: 1.45;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.42);
      max-width: 19rem;
      margin-bottom: auto;
    }

    .btn-start {
      width: 100%;
      max-width: 320px;
      margin-top: 1.5rem;
      padding: 1.05rem 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .btn-start:active {
      transform: scale(0.985);
      background: rgba(255, 255, 255, 0.1);
    }

    /* Countdown */
    .countdown-text {
      font-size: min(28vw, 7.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
    }

    .countdown-text.go {
      font-size: min(22vw, 5.5rem);
      letter-spacing: 0.12em;
      color: #fff;
      animation: goPop 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes goPop {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Game */
    .game-top {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-top: 0.25rem;
    }

    .game-timer {
      font-size: 1.35rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.92);
    }

    .game-center {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .game-emoji {
      font-size: clamp(3.5rem, 18vw, 5rem);
      line-height: 1;
      filter: drop-shadow(0 0 24px rgba(255, 255, 255, 0.1));
    }

    .game-score-label {
      margin-top: 1rem;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    .game-score {
      margin-top: 0.35rem;
      font-size: 2.25rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .leaderboard {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      padding: 1rem 1.1rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .leaderboard-title {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 0.65rem;
    }

    .lb-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0;
      font-size: 0.88rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .lb-row:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .lb-name {
      color: rgba(255, 255, 255, 0.78);
      font-weight: 500;
    }

    .lb-score {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: rgba(255, 255, 255, 0.95);
    }
  </style>
</head>
<body>
  <main class="app">
    <section
      class="panel u-screen-bg u-vignette is-active"
      id="screenWelcome"
      aria-label="Welcome"
      aria-hidden="false"
    >
      <h1 class="brand">Tap Play</h1>
      <p class="subline">Play starts here</p>

      <div class="apple-wrap" id="appleWrap" aria-hidden="true">
        <button type="button" class="apple-btn" id="appleBtn" aria-label="Sign in with Apple">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path
              d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
            />
          </svg>
          Sign in with Apple
        </button>
      </div>

      <div class="accent-line" aria-hidden="true"></div>
    </section>

    <section
      class="panel u-screen-bg u-vignette"
      id="screenLoad"
      aria-label="Game load"
      aria-hidden="true"
    >
      <div class="load-inner">
        <p class="venue-name">peter pan mini golf</p>
        <div class="symbol-emoji" id="emojiLoad" aria-hidden="true">🎯</div>
        <p class="symbol-label">your symbol</p>
        <p class="instructions">
          Race to tap stickers around the venue. First 5 players to tap 10 stickers win.
        </p>
        <button type="button" class="btn-start" id="btnStart">Tap to start</button>
      </div>
    </section>

    <section
      class="panel panel--countdown u-screen-bg"
      id="screenCountdown"
      aria-live="assertive"
      aria-hidden="true"
    >
      <div class="countdown-text" id="countdownText">3</div>
    </section>

    <section
      class="panel panel--game u-screen-bg u-vignette"
      id="screenGame"
      aria-label="Game"
      aria-hidden="true"
    >
      <div class="game-top">
        <div class="game-timer" id="gameTimer">3:00</div>
      </div>
      <div class="game-center">
        <div class="game-emoji" id="emojiGame" aria-hidden="true">🎯</div>
        <p class="game-score-label">Score</p>
        <div class="game-score" id="gameScore">0</div>
      </div>
      <div class="leaderboard">
        <p class="leaderboard-title">Leaderboard</p>
        <div class="lb-row">
          <span class="lb-name">Riley Chen</span><span class="lb-score">4</span>
        </div>
        <div class="lb-row">
          <span class="lb-name">Jordan Blake</span><span class="lb-score">2</span>
        </div>
        <div class="lb-row">
          <span class="lb-name">Sam Okonkwo</span><span class="lb-score">1</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var SYMBOLS = ["🔥", "⚡", "🌊", "👾", "💀", "🎯"];

      var welcome = document.getElementById("screenWelcome");
      var load = document.getElementById("screenLoad");
      var countdown = document.getElementById("screenCountdown");
      var game = document.getElementById("screenGame");
      var appleWrap = document.getElementById("appleWrap");
      var appleBtn = document.getElementById("appleBtn");
      var btnStart = document.getElementById("btnStart");
      var emojiLoad = document.getElementById("emojiLoad");
      var emojiGame = document.getElementById("emojiGame");
      var countdownText = document.getElementById("countdownText");
      var gameTimerEl = document.getElementById("gameTimer");
      var gameScoreEl = document.getElementById("gameScore");

      var playerEmoji = "🎯";
      var timeLeftSec = 180;
      var gameInterval = null;
      var busy = false;

      function vibrate(pattern) {
        if ("vibrate" in navigator) {
          try {
            navigator.vibrate(pattern);
          } catch (_) {}
        }
      }

      if ("vibrate" in navigator) {
        try {
          navigator.vibrate([30, 20, 30]);
        } catch (_) {}
      }

      setTimeout(function () {
        appleWrap.classList.add("visible");
        appleWrap.setAttribute("aria-hidden", "false");
      }, 1500);

      function setPanelActive(panel, active) {
        panel.classList.toggle("is-active", active);
        panel.setAttribute("aria-hidden", active ? "false" : "true");
      }

      function assignRandomSymbol() {
        playerEmoji = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        emojiLoad.textContent = playerEmoji;
        emojiGame.textContent = playerEmoji;
      }

      function formatTime(sec) {
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return m + ":" + (s < 10 ? "0" : "") + s;
      }

      function stopGameTimer() {
        if (gameInterval !== null) {
          clearInterval(gameInterval);
          gameInterval = null;
        }
      }

      function startGameTimer() {
        stopGameTimer();
        timeLeftSec = 180;
        gameTimerEl.textContent = formatTime(timeLeftSec);
        gameInterval = setInterval(function () {
          timeLeftSec -= 1;
          gameTimerEl.textContent = formatTime(Math.max(0, timeLeftSec));
          if (timeLeftSec <= 0) {
            stopGameTimer();
          }
        }, 1000);
      }

      appleBtn.addEventListener("click", function () {
        if (busy) return;
        busy = true;
        vibrate(20);
        setPanelActive(welcome, false);
        setTimeout(function () {
          assignRandomSymbol();
          setPanelActive(load, true);
          busy = false;
        }, 500);
      });

      btnStart.addEventListener("click", function () {
        if (busy) return;
        busy = true;
        vibrate(15);
        setPanelActive(load, false);
        setTimeout(function () {
          setPanelActive(countdown, true);
          runCountdown();
        }, 500);
      });

      function runCountdown() {
        countdownText.classList.remove("go");
        countdownText.textContent = "3";
        vibrate(25);

        setTimeout(function () {
          countdownText.textContent = "2";
          vibrate(25);
        }, 850);

        setTimeout(function () {
          countdownText.textContent = "1";
          vibrate(25);
        }, 1700);

        setTimeout(function () {
          countdownText.textContent = "GO!";
          countdownText.classList.add("go");
          vibrate([40, 30, 60]);
        }, 2550);

        setTimeout(function () {
          setPanelActive(countdown, false);
          gameScoreEl.textContent = "0";
          setPanelActive(game, true);
          startGameTimer();
          busy = false;
        }, 3400);
      }
    })();
  </script>
</body>
</html>
