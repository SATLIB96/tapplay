<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Tap Play</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .screen {
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(1.5rem, env(safe-area-inset-top))
        max(1.5rem, env(safe-area-inset-right))
        max(2rem, env(safe-area-inset-bottom))
        max(1.5rem, env(safe-area-inset-left));
      background: radial-gradient(
          ellipse 120% 80% at 50% 0%,
          rgba(40, 40, 48, 0.45) 0%,
          transparent 55%
        ),
        linear-gradient(180deg, #0c0c0e 0%, #050506 50%, #0a0a0b 100%);
      position: relative;
    }

    /* Subtle vignette */
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    .brand {
      position: relative;
      z-index: 1;
      text-align: center;
      letter-spacing: 0.12em;
      font-weight: 800;
      font-size: clamp(2rem, 8vw, 3.25rem);
      line-height: 1.05;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
      animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards,
        pulse 2.4s ease-in-out 0.9s infinite;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
    }

    @keyframes enter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
        letter-spacing: 0.12em;
      }
      50% {
        opacity: 0.92;
        transform: scale(1.02);
        letter-spacing: 0.14em;
      }
    }

    .subline {
      position: relative;
      z-index: 1;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .apple-wrap {
      position: relative;
      z-index: 1;
      margin-top: 3rem;
      width: 100%;
      max-width: 280px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .apple-wrap.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .apple-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 6px;
      background: #000;
      color: #fff;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .apple-btn:active {
      transform: scale(0.98);
      filter: brightness(1.08);
    }

    .apple-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .accent-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(40%, 140px);
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      opacity: 0.6;
      z-index: 1;
    }
  </style>
</head>
<body>
  <main class="screen">
    <h1 class="brand">Tap Play</h1>
    <p class="subline">Play starts here</p>

    <div class="apple-wrap" id="appleWrap" aria-hidden="true">
      <button type="button" class="apple-btn" id="appleBtn" aria-label="Sign in with Apple">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path
            d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
          />
        </svg>
        Sign in with Apple
      </button>
    </div>

    <div class="accent-line" aria-hidden="true"></div>
  </main>

  <script>
    (function () {
      if ("vibrate" in navigator) {
        try {
          navigator.vibrate([30, 20, 30]);
        } catch (_) {
          /* ignore */
        }
      }

      var wrap = document.getElementById("appleWrap");
      var btn = document.getElementById("appleBtn");

      setTimeout(function () {
        wrap.classList.add("visible");
        wrap.setAttribute("aria-hidden", "false");
      }, 1500);

      btn.addEventListener("click", function () {
        /* Wire to Apple Sign In / backend when ready */
      });
    })();
  </script>
</body>
</html>
